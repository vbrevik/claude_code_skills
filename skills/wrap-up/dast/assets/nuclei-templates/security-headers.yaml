id: stig-header-no-csp

info:
  name: Missing Content-Security-Policy Header
  author: stig-dast
  severity: high
  description: No Content-Security-Policy header found. CSP prevents XSS by restricting script sources.
  metadata:
    stig_id: V-222602
    category: security-headers

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 301
          - 302
        condition: or
      - type: word
        words:
          - "content-security-policy"
        part: header
        negative: true

