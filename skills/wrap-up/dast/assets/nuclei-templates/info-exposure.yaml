id: stig-info-server-header

info:
  name: Server Header Exposes Technology
  author: stig-dast
  severity: info
  description: Server header reveals technology and/or version information. Consider removing or genericizing.
  metadata:
    stig_id: V-222610
    category: info-exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "(?i)^server:\\s*.+"
        part: header
    extractors:
      - type: regex
        regex:
          - "(?i)^server:\\s*(.+)$"
        part: header
        group: 1

---

id: stig-info-powered-by

info:
  name: X-Powered-By Header Present
  author: stig-dast
  severity: info
  description: X-Powered-By header exposes framework information. Remove this header in production.
  metadata:
    stig_id: V-222610
    category: info-exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        words:
          - "x-powered-by"
        part: header
        case-insensitive: true
    extractors:
      - type: regex
        regex:
          - "(?i)^x-powered-by:\\s*(.+)$"
        part: header
        group: 1
