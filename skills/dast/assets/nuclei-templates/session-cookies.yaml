id: stig-cookie-no-httponly

info:
  name: Session Cookie Missing HttpOnly Flag
  author: stig-dast
  severity: high
  description: A Set-Cookie header was found without the HttpOnly flag. Session cookies must use HttpOnly to prevent JavaScript access.
  metadata:
    stig_id: V-222577
    category: session-cookies

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/auth"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "set-cookie"
        part: header
        case-insensitive: true
      - type: regex
        regex:
          - "(?i)set-cookie:(?!.*httponly).*$"
        part: header

