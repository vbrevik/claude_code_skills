id: stig-tls-no-encryption

info:
  name: HTTP (Plaintext) Accessible
  author: stig-dast
  severity: high
  description: Application is accessible over unencrypted HTTP. All connections must use TLS 1.2+.
  metadata:
    stig_id: V-222597
    category: tls-config

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "contains(protocol, 'http')"
          - "!contains(protocol, 'https')"
        condition: and

---

id: stig-tls-version

info:
  name: TLS Version Below 1.2
  author: stig-dast
  severity: medium
  description: Server accepts TLS connections below version 1.2. Only TLS 1.2 and 1.3 are approved.
  metadata:
    stig_id: V-222596
    category: tls-config

ssl:
  - address: "{{Host}}:{{Port}}"
    matchers:
      - type: dsl
        dsl:
          - "contains(tls_version, 'tls10')"
          - "contains(tls_version, 'tls11')"
          - "contains(tls_version, 'ssl')"
        condition: or

---

id: stig-auth-endpoints

info:
  name: Login Endpoint Without Rate Limiting Headers
  author: stig-dast
  severity: medium
  description: Login endpoint does not return rate-limiting headers (X-RateLimit-*, Retry-After). May lack brute-force protection.
  metadata:
    stig_id: V-222432
    category: auth-endpoints

http:
  - method: POST
    path:
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/api/auth/login"
      - "{{BaseURL}}/auth/login"
    body: '{"username":"test","password":"test"}'
    headers:
      Content-Type: application/json
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 401
          - 403
          - 429
        condition: or
      - type: word
        words:
          - "x-ratelimit"
          - "retry-after"
        part: header
        case-insensitive: true
        negative: true
        condition: and
