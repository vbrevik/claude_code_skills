rules:
  - id: stig-input-path-traversal
    patterns:
      - pattern-either:
          - pattern: |
              fs.readFile($PATH, ...)
          - pattern: |
              fs.readFileSync($PATH, ...)
          - pattern: |
              fs.writeFile($PATH, ...)
          - pattern: |
              fs.writeFileSync($PATH, ...)
          - pattern: |
              open($PATH, ...)
          - pattern: |
              os.path.join(..., $PATH)
          - pattern: |
              path.join(..., $PATH)
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-either:
                - pattern: $REQ.params.$X
                - pattern: $REQ.query.$X
                - pattern: $REQ.body.$X
                - pattern: request.args.get(...)
    message: >
      User-controlled input used in file path without canonicalization.
      Canonicalize paths and validate against an allowlist before use.
      Violates STIG V-222605 (CAT II).
    languages: [typescript, javascript, python]
    severity: WARNING
    metadata:
      stig_id: V-222605
      category: input-validation
      confidence: MEDIUM

  - id: stig-input-no-size-limit
    pattern-either:
      - pattern: |
          app.use(express.json())
      - pattern: |
          app.use(bodyParser.json())
      - pattern: |
          express.json()
    message: >
      JSON body parser without explicit size limit. Set a limit to prevent
      oversized request attacks. Example: express.json({ limit: '100kb' }).
      Violates STIG V-222609 (CAT I).
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      stig_id: V-222609
      category: input-validation
      confidence: MEDIUM
