# Custom Trivy policy overrides for defense/government context
# Apply with: trivy config --policy-bundle-repository <none> --config-policy ./trivy-policy.yaml

# Severity overrides for defense context
# In defense environments, certain misconfigurations are elevated in severity

severity_overrides:
  # Elevate root user to HIGH in defense context (normally MEDIUM)
  DS001:
    severity: HIGH
    note: "Defense systems must not run containers as root (NSM baseline)"

  # Elevate missing network policies to HIGH
  KSV021:
    severity: HIGH
    note: "Network segmentation required per sikkerhetsloven"

  # Elevate secrets in env to CRITICAL
  KSV106:
    severity: CRITICAL
    note: "Hardcoded secrets violate RESTRICTED classification handling"

# Skip rules that are false positives for this architecture
skip_rules:
  # Multi-stage builds legitimately use COPY --from
  - DS006

# Custom checks for defense-specific requirements
custom_checks:
  # Verify no internet-accessible URLs in RESTRICTED-side manifests
  restricted_no_internet:
    description: "RESTRICTED-side containers must not reference internet URLs"
    applies_to: ["k8s/*.yaml"]
    pattern: "namespace: vms-restricted"
    deny_pattern: "http(s)?://(?!localhost|host.docker.internal|nats|mock-|keycloak)"
    severity: CRITICAL
    stig_vid: V-222543

  # Verify all RESTRICTED images are from internal registry
  restricted_registry:
    description: "RESTRICTED images must come from internal registry"
    applies_to: ["k8s/*.yaml"]
    pattern: "namespace: vms-restricted"
    image_allow_list:
      - "vms-*"
      - "nats:*"
      - "registry.internal/*"
    severity: HIGH
    stig_vid: V-222548
